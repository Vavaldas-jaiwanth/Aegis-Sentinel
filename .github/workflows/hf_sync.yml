name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          lfs: true
          fetch-depth: 1

      - name: Deploy to HuggingFace (Orphan Branch Trick)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Create orphan branch to bypass history limits
          git checkout --orphan deploy
          git add -A
          git commit -m "Automated CI/CD Deployment to HuggingFace"
          
          # Force push to HF
          git push https://vjaiv:$HF_TOKEN@huggingface.co/spaces/vjaiv/Aegis-Sentinel deploy:main --force
